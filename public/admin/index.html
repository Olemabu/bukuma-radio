<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Station Master — Agum Bukuma Radio</title>
    <link rel="stylesheet" href="/css/glass.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #020617; overflow: auto; min-width: 1000px; }
        .dashboard { padding: 40px; display: grid; grid-template-columns: 1fr 350px; gap: 30px; max-width: 1400px; margin: 0 auto; }
        
        .section-title { font-size: 11px; font-weight: 900; letter-spacing: 3px; opacity: 0.5; margin-bottom: 20px; text-transform: uppercase; }
        
        .console-main { display: flex; flex-direction: column; gap: 30px; }
        .master-controls { display: flex; gap: 20px; align-items: center; }
        
        .transport-btn { width: 80px; height: 80px; border-radius: 20px; font-size: 1.5rem; display: flex; align-items: center; justify-content: center; }
        
        .mic-switch-container { display: flex; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 40px; gap: 10px; width: fit-content; border: 1px solid rgba(255,255,255,0.05); }
        .mic-mode { padding: 12px 25px; border-radius: 30px; cursor: pointer; font-size: 12px; font-weight: 800; transition: all 0.3s; opacity: 0.5; }
        .mic-mode.active { background: var(--glass-accent); color: #000; opacity: 1; box-shadow: 0 0 20px rgba(0,242,254,0.4); }
        
        .vu-strip { height: 10px; background: rgba(0,0,0,0.4); border-radius: 5px; overflow: hidden; position: relative; margin-top: 20px; }
        .vu-fill { height: 100%; width: 0%; background: linear-gradient(to right, #00f2fe, #ff3d00); transition: width 0.1s linear; }

        .library-panel { max-height: 700px; overflow-y: auto; }
        .track-item { padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; transition: 0.2s; }
        .track-item:hover { background: rgba(255,255,255,0.05); }
        .track-item.playing { border-color: var(--glass-accent); background: rgba(0,242,254,0.05); }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="console-main">
            <div class="glass-card" style="position: relative;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px;">
                    <div style="flex: 1;">
                        <div id="airTag" class="on-air-tag" style="margin-bottom: 5px; font-size: 10px;">OFFLINE</div>
                        <h1 class="station-name" style="font-size: 2.2rem; margin: 0; background: linear-gradient(to right, #00f2fe, #4facfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 10px 20px rgba(0,242,254,0.2);">AGUM BUKUMA RADIO</h1>
                    </div>
                    <div id="currentTime" style="font-size: 1.2rem; font-family: 'Courier New', monospace; opacity: 0.3; background: rgba(0,0,0,0.2); padding: 5px 15px; border-radius: 10px;">00:00:00</div>
                </div>
                
                <div style="margin-top: 10px;">
                    <p class="section-title" style="margin-bottom: 5px; opacity: 0.4;">NOW BROADCASTING FROM DISK</p>
                    <div id="trackTitle" style="font-size: 2.8rem; font-weight: 900; color: #fff; line-height: 1; letter-spacing: -1px;">STATION IDLE</div>
                    <div id="trackArtist" style="font-size: 1.4rem; opacity: 0.6; margin-top: 8px; font-weight: 300;">AWAITING SIGNAL...</div>
                </div>

                <!-- Admin Progress Bar -->
                <div style="margin-top: 25px;">
                    <div style="height: 6px; background: rgba(0,0,0,0.3); border-radius: 3px; overflow: hidden; position: relative;">
                        <div id="progFill" style="height: 100%; width: 0%; background: var(--glass-accent); box-shadow: 0 0 10px var(--glass-accent); transition: width 0.3s linear;"></div>
                    </div>
                    <div style="display: flex; justify-content: space-between; font-size: 10px; font-family: monospace; opacity: 0.5; margin-top: 6px;">
                        <span id="progStart">0:00</span>
                        <span id="progEnd">0:00</span>
                    </div>
                </div>

                <div class="vu-strip" style="height: 14px; margin-top: 20px;"><div id="masterVU" class="vu-fill"></div></div>
            </div>

            <div class="master-controls">
                <button class="transport-btn glass-button" onclick="playStation()" id="playBtn">▶</button>
                <button class="transport-btn glass-button" onclick="stopStation()" style="background: rgba(255, 61, 0, 0.4);">⬛</button>
                <button class="transport-btn glass-button" onclick="skipTrack()" style="background: rgba(255,255,255,0.1);">⏭</button>
                
                <div style="margin-left: auto; text-align: right;">
                    <div class="section-title">Remote Listener Status</div>
                    <div class="glass-card" style="padding: 10px 20px; display: flex; align-items: center; gap: 20px; border-radius: 40px; margin-top: 5px;">
                        <div style="text-align: left;">
                            <div style="font-size: 10px; opacity: 0.5;">LATENCY</div>
                            <div id="latencyVal" style="font-weight: 800; font-family: monospace; font-size: 14px; color: var(--glass-accent);">0ms</div>
                        </div>
                        <div style="flex: 1; min-width: 100px;">
                            <div style="font-size: 10px; opacity: 0.5; margin-bottom: 4px;">REMOTE VU</div>
                            <div style="height: 6px; background: rgba(0,0,0,0.3); border-radius: 3px; overflow: hidden;">
                                <div id="remoteVU" style="height: 100%; width: 0%; background: #2ed573; transition: width 0.1s linear;"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="glass-card">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
                    <div>
                        <div class="section-title">Microphone Mixer</div>
                        <div class="mic-switch-container" style="padding: 5px; background: rgba(0,0,0,0.2); border-radius: 40px; display: flex; border: 1px solid rgba(255,255,255,0.05);">
                            <div class="mic-mode active" id="modeOFF" onclick="setMic('OFF')">OFF</div>
                            <div class="mic-mode" id="modeDUCK" onclick="setMic('DUCK')">DUCK</div>
                            <div class="mic-mode" id="modeSOLO" onclick="setMic('SOLO')">SOLO</div>
                        </div>
                    </div>
                    <div>
                        <div class="section-title">Global Sync Level</div>
                        <p style="font-size: 12px; margin-bottom: 10px; opacity: 0.5;">MASTER BROADCAST GAIN</p>
                        <input type="range" style="width: 100%;" value="80" oninput="setVolume(this.value)">
                    </div>
                </div>
            </div>
        </div>

        <div class="library-panel glass-card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <div class="section-title" style="margin: 0;">Permanent Drive Library</div>
                <button class="glass-button" style="padding: 5px 12px; font-size: 10px;" onclick="savePlaylist()">SAVE SET</button>
            </div>
            <div id="libraryList">
                <p style="opacity: 0.3; text-align: center; padding: 40px;">Scanning disk...</p>
            </div>
        </div>
    </div>

    <script>
        let state = { micMode: 'OFF', lastMicMode: 'DUCK' };

        function updateTime() {
            document.getElementById('currentTime').textContent = new Date().toLocaleTimeString();
        }
        setInterval(updateTime, 1000);

        initStatusWS();

        function initStatusWS() {
            const proto = location.protocol === 'https:' ? 'wss' : 'ws';
            const statusWs = new WebSocket(`${proto}://${location.host}/ws`);
            
            statusWs.onmessage = e => {
                const data = JSON.parse(e.data);
                if (data.type === 'status') {
                    // Update Station Info
                    const airTag = document.getElementById('airTag');
                    airTag.textContent = data.isPlaying ? 'ON AIR' : 'OFFLINE';
                    airTag.style.background = data.isPlaying ? 'rgba(0, 242, 254, 0.2)' : 'rgba(255, 61, 0, 0.2)';
                    airTag.style.color = data.isPlaying ? 'var(--glass-accent)' : '#ff3d00';
                    
                    document.getElementById('trackTitle').textContent = data.currentTrack?.title || 'STATION IDLE';
                    document.getElementById('trackArtist').textContent = data.currentTrack?.artist || 'AWAITING SIGNAL...';
                    
                    // Master Button Logic
                    const playBtn = document.getElementById('playBtn');
                    if (data.isPlaying) {
                        playBtn.innerHTML = '⏸';
                        playBtn.onclick = stopStation;
                        playBtn.style.background = 'var(--glass-accent)';
                        playBtn.style.color = '#000';
                    } else {
                        playBtn.innerHTML = '▶';
                        playBtn.onclick = playStation;
                        playBtn.style.background = '';
                        playBtn.style.color = '';
                    }

                    // Progress Bar Logic
                    if (data.duration > 0) {
                        const perc = (data.elapsedTime / data.duration) * 100;
                        document.getElementById('progFill').style.width = perc + '%';
                        document.getElementById('progStart').textContent = formatTime(data.elapsedTime);
                        document.getElementById('progEnd').textContent = formatTime(data.duration);
                    }

                    // Update Remote Status
                    if (data.listenerStats) {
                        document.getElementById('latencyVal').textContent = Math.round(data.listenerStats.latency || 0) + 'ms';
                        document.getElementById('remoteVU').style.width = (data.listenerStats.vu || 0) + '%';
                    }

                    // Render Library if it has changed
                    renderLibrary(data.library, data.currentTrack);
                }
            };
            
            function formatTime(s) {
                const m = Math.floor(s / 60);
                const sec = Math.floor(s % 60);
                return `${m}:${sec.toString().padStart(2, '0')}`;
            }
            
            statusWs.onclose = () => setTimeout(initStatusWS, 2000);
        }

        function playNow(id) {
            fetch('/api/play-id', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id })
            });
        }

        // Keyboard Shortcuts
        window.addEventListener('keydown', e => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (state.micMode === 'OFF') {
                    setMic(state.lastMicMode);
                } else {
                    setMic('OFF');
                }
            }
        });

        let lastLibraryJSON = "";
        let lastCurrentID = "";

        function renderLibrary(tracks, current) {
            const list = document.getElementById('libraryList');
            if (!tracks || tracks.length === 0) return;

            const currentJSON = JSON.stringify(tracks);
            const currentID = current?.id || "";

            // Only re-render if library content or selection changed
            if (currentJSON === lastLibraryJSON && currentID === lastCurrentID) return;
            
            lastLibraryJSON = currentJSON;
            lastCurrentID = currentID;

            list.innerHTML = tracks.map(t => `
                <div class="track-item ${currentID === t.id ? 'playing' : ''}">
                    <div style="min-width: 0; flex: 1;">
                        <div style="font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${t.title}</div>
                        <div style="font-size: 10px; opacity: 0.5;">${t.artist}</div>
                    </div>
                    <button class="glass-button" style="padding: 4px 10px; font-size: 9px; margin-left: 10px;" onclick="playNow('${t.id}')">PLAY</button>
                </div>
            `).join('');
        }

        function setMic(mode) {
            if (mode !== 'OFF') state.lastMicMode = mode;
            state.micMode = mode;
            document.querySelectorAll('.mic-mode').forEach(m => m.classList.remove('active'));
            document.getElementById('mode' + mode).classList.add('active');
            fetch('/api/mic', { method: 'POST', body: JSON.stringify({ mode }), headers: { 'Content-Type': 'application/json' } });
            
            if (mode !== 'OFF') startMic(); else stopMic();
        }

        let micAudio = null;
        let ws = null;

        async function startMic() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const audioCtx = new AudioContext({ sampleRate: 22050 });
            const source = audioCtx.createMediaStreamSource(stream);
            const processor = audioCtx.createScriptProcessor(4096, 1, 1);
            
            const proto = location.protocol === 'https:' ? 'wss' : 'ws';
            ws = new WebSocket(`${proto}://${location.host}/ws`);
            
            processor.onaudioprocess = e => {
                const input = e.inputBuffer.getChannelData(0);
                const pcm = new Int16Array(input.length);
                for (let i = 0; i < input.length; i++) {
                    pcm[i] = Math.max(-1, Math.min(1, input[i])) * 0x7FFF;
                }
                if (ws.readyState === WebSocket.OPEN) ws.send(pcm.buffer);
            };
            
            source.connect(processor);
            processor.connect(audioCtx.destination);
            micAudio = { stream, audioCtx, processor };
        }

        function stopMic() {
            if (micAudio) {
                micAudio.stream.getTracks().forEach(t => t.stop());
                micAudio.audioCtx.close();
                ws.close();
                micAudio = null;
            }
        }

        function playStation() { fetch('/api/play', { method: 'POST' }); }
        function stopStation() { fetch('/api/stop', { method: 'POST' }); }
        function skipTrack() { fetch('/api/skip', { method: 'POST' }); }
        function setVolume(v) { fetch('/api/volume', { method: 'POST', body: JSON.stringify({ volume: v }), headers: { 'Content-Type': 'application/json' } }); }
    </script>
</body>
</html>
