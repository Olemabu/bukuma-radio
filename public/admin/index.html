<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bukuma Radio — Admin</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --accent: #e63946;
    --accent2: #4cc9f0;
    --green: #2dc653;
    --yellow: #f4d03f;
    --text: #e8eaf6;
    --muted: #8890a6;
    --radius: 10px;
  }
  html, body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; }

  /* ── LOGIN ── */
  #loginScreen {
    display: flex; align-items: center; justify-content: center; min-height: 100vh;
  }
  .login-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    padding: 40px; width: 340px; text-align: center;
  }
  .login-card h1 { font-size: 1.6rem; margin-bottom: 6px; }
  .login-card p { color: var(--muted); margin-bottom: 28px; font-size: 0.9rem; }
  .login-card input {
    width: 100%; padding: 12px 16px; background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text); font-size: 1rem; margin-bottom: 14px;
  }
  .login-card input:focus { outline: none; border-color: var(--accent2); }
  .btn-login {
    width: 100%; padding: 13px; background: var(--accent); border: none; border-radius: var(--radius);
    color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; transition: opacity .2s;
  }
  .btn-login:hover { opacity: .85; }
  #loginError { color: var(--accent); margin-top: 12px; font-size: 0.9rem; }

  /* ── MAIN LAYOUT ── */
  #mainScreen { display: none; flex-direction: column; }
  header {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; background: var(--surface); border-bottom: 1px solid var(--border);
  }
  header .logo { font-size: 1.2rem; font-weight: 700; }
  header .logo span { color: var(--accent); }
  .on-air-badge {
    display: flex; align-items: center; gap: 8px; font-size: 0.85rem; font-weight: 600;
    background: rgba(230,57,70,.15); border: 1px solid rgba(230,57,70,.4);
    padding: 6px 14px; border-radius: 20px; color: var(--accent);
  }
  .on-air-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: blink 1.2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .listener-count { color: var(--muted); font-size: 0.85rem; }

  .main-grid {
    display: grid; grid-template-columns: 1fr 300px; gap: 16px;
    padding: 16px; align-items: start;
  }
  @media(max-width:900px) { .main-grid { grid-template-columns: 1fr; } }

  /* ── PANEL CARDS ── */
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 20px; margin-bottom: 20px;
  }
  .card:last-child { margin-bottom: 0; }
  .card-title {
    font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .12em;
    color: var(--muted); margin-bottom: 16px;
  }

  /* ── NOW PLAYING ── */
  .track-display {
    background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 20px; display: flex; align-items: center; gap: 16px;
  }
  .track-thumb {
    width: 72px; height: 72px; border-radius: 8px; object-fit: cover;
    background: #222; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  }
  .track-thumb svg { opacity: .4; }
  .track-info { flex: 1; min-width: 0; }
  .track-title { font-size: 1.1rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .track-artist { color: var(--muted); font-size: 0.85rem; margin-top: 4px; }
  .track-duration { color: var(--muted); font-size: 0.85rem; margin-top: 6px; }

  /* ── TRANSPORT CONTROLS ── */
  .transport { display: flex; align-items: center; gap: 14px; margin-top: 20px; flex-wrap: wrap; }
  .btn-play {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    padding: 0 32px; height: 56px; font-size: 1.1rem; font-weight: 700;
    background: var(--green); color: #fff; border: none; border-radius: 12px; cursor: pointer;
    transition: opacity .2s, transform .1s;
  }
  .btn-play:hover { opacity: .9; transform: scale(1.02); }
  .btn-stop {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    padding: 0 28px; height: 56px; font-size: 1.1rem; font-weight: 700;
    background: var(--accent); color: #fff; border: none; border-radius: 12px; cursor: pointer;
    transition: opacity .2s;
  }
  .btn-stop:hover { opacity: .9; }
  .btn-skip {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 0 22px; height: 56px; font-size: 1rem; font-weight: 600;
    background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 12px; cursor: pointer;
    transition: background .2s;
  }
  .btn-skip:hover { background: #23263a; }

  /* volume row */
  .volume-row { display: flex; align-items: center; gap: 12px; margin-top: 20px; }
  .volume-row label { color: var(--muted); font-size: 0.85rem; white-space: nowrap; }
  input[type=range] { flex: 1; height: 4px; accent-color: var(--accent2); cursor: pointer; }
  .volume-val { color: var(--text); font-size: 0.85rem; width: 36px; text-align: right; }

  /* monitor row */
  .monitor-row { display: flex; align-items: center; gap: 12px; margin-top: 14px; }
  .btn-monitor {
    display: flex; align-items: center; gap: 8px; padding: 10px 18px; font-size: 0.9rem; font-weight: 600;
    background: var(--bg); color: var(--muted); border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer;
    transition: background .2s, color .2s, border-color .2s;
  }
  .btn-monitor.active { background: rgba(76,201,240,.12); color: var(--accent2); border-color: var(--accent2); }

  /* ── MIC SECTION ── */
  .mic-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
  .mic-card {
    background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; text-align: center;
  }
  .mic-label { font-size: 0.8rem; color: var(--muted); margin-bottom: 10px; font-weight: 600; text-transform: uppercase; letter-spacing:.05em; }
  .mic-btn-group { display: flex; gap: 6px; justify-content: center; }
  .mic-btn {
    flex: 1; padding: 8px 4px; font-size: 0.75rem; font-weight: 700;
    border: 1px solid var(--border); background: var(--surface); color: var(--muted);
    border-radius: 6px; cursor: pointer; transition: background .15s, color .15s, border-color .15s;
  }
  .mic-btn.active-talk { background: rgba(230,57,70,.2); color: var(--accent); border-color: var(--accent); }
  .mic-btn.active-solo { background: rgba(244,208,63,.18); color: var(--yellow); border-color: var(--yellow); }
  .mic-btn.active-off  { background: rgba(44,44,60,.4); color: var(--muted); border-color: var(--border); }

  /* ── SEARCH & QUEUE ── */
  .search-row { display: flex; gap: 10px; }
  .search-row input {
    flex: 1; padding: 10px 14px; background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text); font-size: 0.95rem;
  }
  .search-row input:focus { outline: none; border-color: var(--accent2); }
  .search-row button {
    padding: 10px 18px; background: var(--accent2); color: #000; font-weight: 700; font-size: 0.9rem;
    border: none; border-radius: var(--radius); cursor: pointer; white-space: nowrap;
  }
  .search-row button:hover { opacity: .85; }
  .results-list { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; max-height: 280px; overflow-y: auto; }
  .result-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px; cursor: pointer;
    transition: border-color .15s;
  }
  .result-item:hover { border-color: var(--accent2); }
  .result-item img { width: 48px; height: 36px; object-fit: cover; border-radius: 4px; flex-shrink: 0; }
  .result-text { flex: 1; min-width: 0; }
  .result-title { font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .result-dur { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
  .result-add {
    padding: 6px 12px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-size: 0.8rem; font-weight: 600;
    cursor: pointer; flex-shrink: 0;
  }
  .result-add:hover { background: var(--accent2); color: #000; border-color: var(--accent2); }
  #searchStatus { margin-top: 8px; font-size: 0.82rem; color: var(--muted); }

  /* ── QUEUE ── */
  .queue-list { display: flex; flex-direction: column; gap: 8px; }
  .queue-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
  }
  .queue-item.playing { border-color: var(--green); }
  .queue-num { color: var(--muted); font-size: 0.8rem; width: 20px; text-align: center; flex-shrink: 0; }
  .queue-title { flex: 1; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .queue-dur { color: var(--muted); font-size: 0.78rem; flex-shrink: 0; }
  .queue-remove {
    width: 26px; height: 26px; border-radius: 50%; border: 1px solid var(--border);
    background: none; color: var(--muted); cursor: pointer; font-size: 1rem; line-height: 1;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .queue-remove:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .queue-empty { color: var(--muted); font-size: 0.85rem; text-align: center; padding: 20px; }

  /* status bar */
  .statusbar {
    padding: 8px 24px; background: var(--surface); border-top: 1px solid var(--border);
    font-size: 0.78rem; color: var(--muted); display: flex; gap: 20px; flex-wrap: wrap; margin-top: 4px;
  }
  .statusbar span { display: flex; align-items: center; gap: 6px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; }
  .dot.green { background: var(--green); }
  .dot.red { background: var(--accent); }
  .dot.grey { background: var(--muted); }

  /* scrollbars */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<!-- ═══════════ LOGIN ═══════════ -->
<div id="loginScreen">
  <div class="login-card">
    <h1>🎙 Bukuma Radio</h1>
    <p>Admin Panel — Sign In</p>
    <input type="password" id="pwInput" placeholder="Password" autocomplete="current-password">
    <button class="btn-login" onclick="doLogin()">Sign In</button>
    <div id="loginError"></div>
  </div>
</div>

<!-- ═══════════ MAIN ═══════════ -->
<div id="mainScreen">
  <header>
    <div class="logo"><span>BUKUMA</span> RADIO</div>
    <div class="on-air-badge"><span class="on-air-dot"></span> ON AIR</div>
    <div class="header-right">
      <span class="listener-count" id="listenerCount">— listeners</span>
    </div>
  </header>

  <div class="main-grid">

    <!-- ── LEFT COLUMN ── -->
    <div>

      <!-- Now Playing + Transport -->
      <div class="card">
        <div class="card-title">Now Playing</div>
        <div class="track-display">
          <div class="track-thumb" id="trackThumb">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="12" cy="12" r="10"/><path d="M10 8l6 4-6 4V8z"/>
            </svg>
          </div>
          <div class="track-info">
            <div class="track-title" id="trackTitle">— Station Idle —</div>
            <div class="track-artist" id="trackArtist">Start playing to see track info</div>
            <div class="track-duration" id="trackDuration"></div>
          </div>
        </div>

        <!-- BIG TRANSPORT CONTROLS -->
        <div class="transport">
          <button class="btn-play" id="btnPlay" onclick="playStation()">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            PLAY
          </button>
          <button class="btn-stop" onclick="stopStation()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
            STOP
          </button>
          <button class="btn-skip" onclick="skipTrack()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            SKIP
          </button>
        </div>

        <!-- Volume -->
        <div class="volume-row">
          <label>Volume</label>
          <input type="range" id="volumeSlider" min="0" max="100" value="80" oninput="setVolume(this.value)">
          <span class="volume-val" id="volumeVal">80%</span>
        </div>

        <!-- Monitor -->
        <div class="monitor-row">
          <button class="btn-monitor" id="monitorBtn" onclick="toggleMonitor()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3z"/>
              <path d="M3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/>
            </svg>
            Monitor Stream
          </button>
          <span id="monitorStatus" style="font-size:.82rem;color:var(--muted)">Off</span>
        </div>
      </div>

      <!-- Mic Controls -->
      <div class="card">
        <div class="card-title">Microphone Controls</div>
        <div class="mic-grid" id="micGrid"></div>
      </div>

      <!-- YouTube Search -->
      <div class="card">
        <div class="card-title">YouTube Search</div>
        <div class="search-row">
          <input type="text" id="searchInput" placeholder="Search for music..." onkeydown="if(event.key==='Enter')doSearch()">
          <button onclick="doSearch()">Search</button>
        </div>
        <div id="searchStatus"></div>
        <div class="results-list" id="resultsList"></div>
      </div>

    </div><!-- end left col -->

    <!-- ── RIGHT COLUMN ── -->
    <div>
      <div class="card">
        <div class="card-title">Play Queue</div>
        <div class="queue-list" id="queueList">
          <div class="queue-empty">Queue is empty</div>
        </div>
      </div>
    </div>

  </div><!-- end main-grid -->

  <div class="statusbar">
    <span><span class="dot" id="streamDot"></span> <span id="streamStatus">—</span></span>
    <span><span class="dot grey" id="wsDot"></span> WS: <span id="wsStatus">disconnected</span></span>
    <span id="codecInfo"></span>
  </div>
</div><!-- end mainScreen -->

<audio id="monitorAudio" src="/stream" preload="none"></audio>

<script>
'use strict';

const STATE = {
  token: null, isPlaying: false,
  mics: [{ id: 'mic1', label: 'Mic 1', mode: 'off' }, { id: 'mic2', label: 'Mic 2', mode: 'off' }],
  queue: [], currentTrack: null, ws: null, monitorOn: false, micStream: null, micRecorder: null,
};

document.getElementById('pwInput').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

async function doLogin() {
  const pw = document.getElementById('pwInput').value.trim();
  if (!pw) return;
  try {
    const r = await fetch('/api/admin/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: pw }),
    });
    const d = await r.json();
    if (d.success) {
      STATE.token = d.token || pw;
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('mainScreen').style.display = 'block';
      initDashboard();
    } else {
      document.getElementById('loginError').textContent = 'Incorrect password';
    }
  } catch(e) {
    document.getElementById('loginError').textContent = 'Connection error: ' + e.message;
  }
}

function initDashboard() {
  renderMics();
  connectWS();
  fetchStatus();
  fetchQueue();
  setInterval(fetchStatus, 8000);
  setInterval(fetchQueue, 10000);
}

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws = new WebSocket(`${proto}://${location.host}`);
  STATE.ws = ws;
  ws.onopen = () => { setWsStatus('connected', true); ws.send(JSON.stringify({ type: 'auth', token: STATE.token })); };
  ws.onclose = () => { setWsStatus('disconnected', false); setTimeout(connectWS, 4000); };
  ws.onerror = () => setWsStatus('error', false);
  ws.onmessage = (ev) => { try { handleWS(JSON.parse(ev.data)); } catch(_) {} };
}

function handleWS(msg) {
  if (msg.type === 'status') updateStatus(msg);
  if (msg.type === 'queueUpdate') renderQueue(msg.queue || []);
  if (msg.type === 'trackChange') { STATE.currentTrack = msg.track; renderNowPlaying(msg.track); }
  if (msg.type === 'listenerCount') document.getElementById('listenerCount').textContent = msg.count + ' listener' + (msg.count === 1 ? '' : 's');
}

function setWsStatus(txt, ok) {
  document.getElementById('wsStatus').textContent = txt;
  document.getElementById('wsDot').className = 'dot ' + (ok ? 'green' : 'red');
}

async function fetchStatus() {
  try { const r = await fetch('/api/status'); updateStatus(await r.json()); } catch(_) {}
}

function updateStatus(d) {
  STATE.isPlaying = d.isPlaying;
  if (d.currentTrack) { STATE.currentTrack = d.currentTrack; renderNowPlaying(d.currentTrack); }
  if (d.listeners !== undefined) document.getElementById('listenerCount').textContent = d.listeners + ' listener' + (d.listeners === 1 ? '' : 's');
  const playing = d.isPlaying;
  document.getElementById('streamDot').className = 'dot ' + (playing ? 'green' : 'grey');
  document.getElementById('streamStatus').textContent = playing ? 'Streaming' : 'Idle';
  const btn = document.getElementById('btnPlay');
  if (playing) {
    btn.innerHTML = '<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg> PAUSE';
    btn.style.background = 'var(--yellow)'; btn.style.color = '#000';
  } else {
    btn.innerHTML = '<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> PLAY';
    btn.style.background = 'var(--green)'; btn.style.color = '#fff';
  }
}

function renderNowPlaying(track) {
  if (!track) return;
  document.getElementById('trackTitle').textContent = track.title || 'Unknown Track';
  document.getElementById('trackArtist').textContent = track.artist || track.channel || '';
  document.getElementById('trackDuration').textContent = track.duration ? formatDur(track.duration) : '';
  const thumb = document.getElementById('trackThumb');
  if (track.thumbnail || track.videoId) {
    const url = track.thumbnail || `https://img.youtube.com/vi/${track.videoId}/mqdefault.jpg`;
    thumb.innerHTML = `<img src="${url}" style="width:72px;height:72px;object-fit:cover;border-radius:8px;" onerror="this.style.display='none'">`;
  }
}

async function playStation() {
  try {
    if (STATE.isPlaying) { await apiFetch('/api/stop', 'POST'); } else { await apiFetch('/api/play', 'POST'); }
    await fetchStatus(); await fetchQueue();
  } catch(e) { alert('Error: ' + e.message); }
}

async function stopStation() {
  try { await apiFetch('/api/stop', 'POST'); await fetchStatus(); } catch(e) { alert('Error: ' + e.message); }
}

async function skipTrack() {
  try { await apiFetch('/api/skip', 'POST'); await fetchStatus(); await fetchQueue(); } catch(e) { alert('Error: ' + e.message); }
}

async function setVolume(val) {
  document.getElementById('volumeVal').textContent = val + '%';
  try { await apiFetch('/api/volume', 'POST', { volume: parseInt(val) }); } catch(_) {}
}

function toggleMonitor() {
  const audio = document.getElementById('monitorAudio');
  STATE.monitorOn = !STATE.monitorOn;
  if (STATE.monitorOn) {
    audio.play().catch(() => {});
    document.getElementById('monitorBtn').classList.add('active');
    document.getElementById('monitorStatus').textContent = 'Listening...';
  } else {
    audio.pause(); audio.currentTime = 0;
    document.getElementById('monitorBtn').classList.remove('active');
    document.getElementById('monitorStatus').textContent = 'Off';
  }
}

function renderMics() {
  document.getElementById('micGrid').innerHTML = STATE.mics.map((m, i) => `
    <div class="mic-card">
      <div class="mic-label">${m.label}</div>
      <div class="mic-btn-group">
        <button class="mic-btn ${m.mode==='talk'?'active-talk':''}" onclick="setMic(${i},'talk')">TALK</button>
        <button class="mic-btn ${m.mode==='solo'?'active-solo':''}" onclick="setMic(${i},'solo')">SOLO</button>
        <button class="mic-btn ${m.mode==='off'?'active-off':''}" onclick="setMic(${i},'off')">OFF</button>
      </div>
    </div>`).join('');
}

async function setMic(idx, mode) {
  const mic = STATE.mics[idx];
  const wasActive = mic.mode !== 'off';
  mic.mode = mode;
  renderMics();
  if (mode !== 'off' && !wasActive) await startMicStream(idx, mode);
  else if (mode === 'off') stopMicStream(idx);
  try { await apiFetch('/api/mic', 'POST', { micId: mic.id, mode }); } catch(_) {}
}

function startMicStream(idx, mode) {
  return navigator.mediaDevices.getUserMedia({ audio: true, video: false }).then(stream => {
    STATE.micStream = stream;
    const ws = STATE.ws;
    if (!ws || ws.readyState !== 1) return;
    ws.send(JSON.stringify({ type: 'micStart', micId: STATE.mics[idx].id, mode }));
    const recorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
    recorder.ondataavailable = e => { if (e.data.size > 0 && ws.readyState === 1) ws.send(e.data); };
    recorder.start(100);
    STATE.micRecorder = recorder;
  }).catch(e => alert('Mic error: ' + e.message));
}

function stopMicStream(idx) {
  if (STATE.micRecorder) { try { STATE.micRecorder.stop(); } catch(_){} STATE.micRecorder = null; }
  if (STATE.micStream) { STATE.micStream.getTracks().forEach(t => t.stop()); STATE.micStream = null; }
  if (STATE.ws && STATE.ws.readyState === 1) STATE.ws.send(JSON.stringify({ type: 'micStop', micId: STATE.mics[idx].id }));
}

async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  document.getElementById('searchStatus').textContent = 'Searching...';
  document.getElementById('resultsList').innerHTML = '';
  try {
    const r = await fetch('/api/youtube/search?q=' + encodeURIComponent(q));
    const data = await r.json();
    const results = data.results || data;
    document.getElementById('searchStatus').textContent = results.length + ' result' + (results.length===1?'':'s');
    document.getElementById('resultsList').innerHTML = results.map(item => `
      <div class="result-item">
        <img src="https://img.youtube.com/vi/${item.videoId||item.id}/default.jpg" onerror="this.style.display='none'">
        <div class="result-text">
          <div class="result-title">${escHtml(item.title)}</div>
          <div class="result-dur">${item.duration||''}</div>
        </div>
        <button class="result-add" onclick='addToQueue(${JSON.stringify(JSON.stringify(item))})'>+ Queue</button>
      </div>`).join('');
  } catch(e) { document.getElementById('searchStatus').textContent = 'Error: ' + e.message; }
}

async function addToQueue(itemJson) {
  const item = JSON.parse(itemJson);
  try {
    await apiFetch('/api/queue/add', 'POST', { videoId: item.videoId||item.id, title: item.title, duration: item.duration });
    await fetchQueue();
  } catch(e) { alert('Error adding to queue: ' + e.message); }
}

async function fetchQueue() {
  try { const r = await fetch('/api/queue'); renderQueue((await r.json()).queue || []); } catch(_) {}
}

function renderQueue(queue) {
  STATE.queue = queue;
  const el = document.getElementById('queueList');
  if (!queue.length) { el.innerHTML = '<div class="queue-empty">Queue is empty — search for music above</div>'; return; }
  el.innerHTML = queue.map((item, i) => `
    <div class="queue-item ${i===0?'playing':''}">
      <span class="queue-num">${i===0?'▶':i+1}</span>
      <span class="queue-title">${escHtml(item.title||'Track '+(i+1))}</span>
      <span class="queue-dur">${item.duration||''}</span>
      <button class="queue-remove" onclick="removeFromQueue(${i})" title="Remove">×</button>
    </div>`).join('');
}

async function removeFromQueue(idx) {
  try { await apiFetch('/api/queue/remove', 'POST', { index: idx }); await fetchQueue(); } catch(e) { alert('Error: ' + e.message); }
}

async function apiFetch(url, method, body) {
  const opts = { method: method||'GET', headers: { 'Content-Type': 'application/json', 'x-admin-token': STATE.token, 'Authorization': 'Bearer '+STATE.token } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(url, opts);
  if (!r.ok) { const txt = await r.text().catch(() => r.statusText); throw new Error(txt||r.status); }
  return r.json().catch(() => ({}));
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatDur(s) {
  if (!s && s !== 0) return '';
  if (typeof s === 'string') return s;
  const m = Math.floor(s/60), sec = Math.floor(s%60);
  return m+':'+String(sec).padStart(2,'0');
}
