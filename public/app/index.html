<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AGUM BUKUMA - Community App</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Playfair+Display:wght@700;900&display=swap');
    
    :root {
      --primary: #8B4513;
      --accent: #D4AF37;
      --bg: #0D0805;
      --card: #3D2B1F;
      --text: #F5DEB3;
      --green: #4ade80;
      --brass: linear-gradient(135deg, #d4af37 0%, #f9e29c 45%, #b8860b 100%);
      --wood: url('https://www.transparenttextures.com/patterns/dark-wood.png');
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', sans-serif;
      background: #0f0a08 var(--wood);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }

    /* THE HARDWARE CHASSIS */
    .radio-chassis {
      width: 100%; max-width: 1200px; height: 90vh;
      background: var(--card);
      border: 20px solid #1a1210;
      border-radius: 40px;
      box-shadow: inset 0 0 100px rgba(0,0,0,0.6), 0 50px 150px rgba(0,0,0,1);
      position: relative; overflow: hidden;
      display: flex; flex-direction: column;
    }

    .screw {
      position: absolute; width: 16px; height: 16px; background: var(--brass); border-radius: 50%; z-index: 100;
      box-shadow: 0 3px 6px rgba(0,0,0,0.5);
    }
    .screw::after { content: ''; position: absolute; top:50%; left:15%; right:15%; height:2px; background:rgba(0,0,0,0.3); transform:rotate(45deg); }
    .tl { top: 20px; left: 20px; } .tr { top: 20px; right: 20px; }
    .bl { bottom: 20px; left: 20px; } .br { bottom: 20px; right: 20px; }

    /* GATEWAY OVERLAY */
    #gateway {
      position: absolute; inset: 0; background: #2b1b17 var(--wood); z-index: 500;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: transform 1s cubic-bezier(0.8, 0, 0.2, 1);
    }
    #gateway.unlocked { transform: translateY(-100%); }

    .gateway-plate {
       width: 500px; padding: 60px 40px; background: rgba(0,0,0,0.3);
       border: 8px inset #1a1210; border-radius: 12px; text-align: center;
    }

    .hw-input {
      width: 100%; padding: 15px; background: #0a0503; border: 2px inset #2b1b17;
      color: var(--green); font-family: 'Courier New', monospace; margin-bottom: 20px; outline: none;
    }

    /* THE ROCKER SWITCH (Flip to Launch) */
    .rocker-unit { margin-top: 40px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .rocker {
      width: 60px; height: 100px; background: #333; border: 4px solid #111; border-radius: 8px;
      position: relative; cursor: pointer;
    }
    .rocker::before {
      content: ''; position: absolute; top: 5px; left: 5px; right: 5px; height: 40px;
      background: linear-gradient(#555, #222); border-radius: 4px; transition: 0.2s;
    }
    .rocker.active::before { top: 50px; background: linear-gradient(#4ade80, #1e5c2f); box-shadow: 0 0 20px #4ade80; }

    /* VU METERS */
    .vu-meter {
      width: 140px; height: 80px; background: #222; border: 4px solid #111; border-radius: 4px;
      position: relative; overflow: hidden; margin-bottom: 10px;
    }
    .vu-scale { position: absolute; inset: 5px; border: 1px solid rgba(255,255,255,0.1); }
    .vu-needle {
      position: absolute; bottom: -20px; left: 50%; width: 2px; height: 90px;
      background: #ff4757; transform-origin: bottom center; transform: rotate(-45deg);
      transition: transform 0.1s cubic-bezier(0.1, 0, 0.9, 1);
    }
    .vu-label { position: absolute; bottom: 5px; width: 100%; text-align: center; font-size: 8px; color: #555; font-weight: 900; }

    /* NEWS CAROUSEL */
    .news-belt {
      height: 60px; background: rgba(0,0,0,0.4); border-bottom: 2px solid rgba(212,175,55,0.1);
      display: flex; align-items: center; overflow: hidden; position: relative;
    }
    .news-track {
      display: flex; white-space: nowrap; animation: scroll 30s linear infinite;
    }
    @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    .news-item {
       padding: 0 40px; color: var(--accent); font-weight: 900; font-size: 11px;
       letter-spacing: 2px; text-transform: uppercase; cursor: pointer; text-decoration: none;
    }
    .news-item:hover { color: #fff; }

    /* PLAYER INTERFACE */
    .console-content { flex: 1; padding: 40px; display: flex; flex-direction: column; gap: 40px; }
    .crt-monitor {
      background: #050805; border: 12px solid #1a1210; border-radius: 20px;
      padding: 40px; box-shadow: inset 0 0 60px #000; color: var(--green);
      font-family: 'Courier New', monospace; position: relative;
    }
    .crt-monitor::after {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background: repeating-linear-gradient(rgba(0,0,0,0) 0px, rgba(0,0,0,0) 1px, rgba(74, 222, 128, 0.03) 2px);
    }

    .knob {
      width: 120px; height: 120px; background: var(--brass); border-radius: 50%;
      position: relative; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.6);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .knob::before { content: ''; position: absolute; top: 10%; left: 50%; width: 6px; height: 18%; background: #111; transform: translateX(-50%); border-radius: 3px; }
    .knob.active { transform: rotate(45deg); box-shadow: 0 0 40px rgba(212,175,55,0.4); }

    .label { font-size: 9px; letter-spacing: 3px; color: #777; font-weight: 900; text-transform: uppercase; }
  </style>
</head>
<body>

  <div class="radio-chassis">
    <div class="screw tl"></div><div class="screw tr"></div>
    <div class="screw bl"></div><div class="screw br"></div>

    <!-- TIER 2: ACTIVATION GATEWAY -->
    <div id="gateway">
       <div class="gateway-plate">
          <h2 style="font-family:'Playfair Display', serif; color:var(--accent); font-size:28px; margin-bottom:10px;">COMMUNITY UPLINK</h2>
          <p class="label" style="margin-bottom:40px;">VILLAGE VERIFICATION REQUIRED</p>
          
          <input type="text" id="vName" class="hw-input" placeholder="OPERATOR NAME" onkeydown="if(event.key==='Enter')document.getElementById('vVillage').focus()">
          <input type="text" id="vVillage" class="hw-input" placeholder="BUKUMA VILLAGE" onkeydown="if(event.key==='Enter')launchStation()">
          
          <div class="rocker-unit">
             <div class="rocker" id="launchRocker" onclick="launchStation()"></div>
             <span class="label" id="launchLabel">FLIP TO LAUNCH</span>
          </div>
          <div id="gateErr" style="color:var(--red); font-size:10px; margin-top:20px; font-weight:900;"></div>
       </div>
    </div>

    <!-- NEWS CAROUSEL -->
    <div class="news-belt">
       <div id="newsTrack" class="news-track">
          <!-- Populated from herald.json -->
       </div>
    </div>

    <!-- MAIN CONSOLE -->
    <div class="console-content">
       <div class="crt-monitor">
          <div style="display: flex; justify-content: space-between;">
             <div>
                <p class="label" style="opacity:0.6; margin-bottom:10px;">NOW BROADCASTING:</p>
                <h1 id="trackTitle" style="font-size:36px;">STATION IDLE</h1>
                <p id="trackArtist" style="font-size:18px; opacity:0.8;">Waiting for sync...</p>
             </div>
             <div style="text-align: right;">
                <p class="label" style="opacity:0.6; margin-bottom:10px;">SIGNAL STATUS:</p>
                <div id="signalStatus" style="font-weight:900; color:var(--green);">READY</div>
             </div>
          </div>
       </div>

       <div style="display: flex; justify-content: space-around; align-items: center;">
          <div style="text-align: center;">
             <div class="vu-meter">
                <div class="vu-scale"></div>
                <div id="needle1" class="vu-needle"></div>
                <div class="vu-label">L-SIGNAL</div>
             </div>
             <div class="vu-meter">
                <div class="vu-scale"></div>
                <div id="needle2" class="vu-needle"></div>
                <div class="vu-label">R-SIGNAL</div>
             </div>
          </div>
          <div style="text-align: center;">
             <div class="knob" id="powerKnob" onclick="togglePower()"></div>
             <p class="label" id="knobLabel" style="margin-top:20px;">POWER / OFF</p>
          </div>
          <div style="text-align: center;">
             <div id="statListeners" style="font-size:64px; font-weight:900; color:var(--green); letter-spacing:-4px;">000</div>
             <p class="label">ACTIVE UPLINKS</p>
          </div>
       </div>

       <div style="text-align:center; margin-top:20px;">
          <p class="label" style="margin-bottom:20px;">COMMUNITY ACCESS PANEL • GATED UNIT</p>
          <a href="/" style="color:var(--accent); font-size:10px; text-decoration:none; font-weight:900; border:1px solid #444; padding:10px 20px; border-radius:4px;">EXIT TO PUBLIC PORTAL</a>
       </div>
    </div>
  </div>

  <audio id="radioAudio" src="/stream" preload="none"></audio>

  <script>
    var ws = null, audioPlaying = false, needleTimer = null;

    function checkAuth() {
      if(localStorage.getItem('bukuma_authorized') === 'true') {
        document.getElementById('gateway').classList.add('unlocked');
        connectWS();
      }
    }

    async function launchStation() {
      const name = document.getElementById('vName').value;
      const village = document.getElementById('vVillage').value;
      if(!name || !village) return;

      const rocker = document.getElementById('launchRocker');
      rocker.classList.add('active');
      document.getElementById('launchLabel').textContent = 'LAUNCHING...';

      try {
        const r = await fetch('/api/register', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({name, village, phone: '000'})
        });
        const d = await r.json();
        if(d.success) {
          localStorage.setItem('bukuma_authorized', 'true');
          setTimeout(() => {
            document.getElementById('gateway').classList.add('unlocked');
            connectWS();
          }, 800);
        } else {
          document.getElementById('gateErr').textContent = d.error.toUpperCase();
          rocker.classList.remove('active');
          document.getElementById('launchLabel').textContent = 'FLIP TO LAUNCH';
        }
      } catch(e) {
        document.getElementById('gateErr').textContent = 'UPLINK ERROR';
        rocker.classList.remove('active');
      }
    }

    function connectWS() {
      var proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(proto + '://' + location.host);
      ws.onopen = () => { document.getElementById('signalStatus').textContent = 'LOCKED'; ws.send(JSON.stringify({ action: 'getStatus' })); };
      ws.onmessage = e => { try { handleMessage(JSON.parse(e.data)); } catch(err){} };
      ws.onclose = () => setTimeout(connectWS, 3000);
    }

    function handleMessage(d) {
      if(d.type === 'status') {
        document.getElementById('trackTitle').textContent = d.currentTrack ? d.currentTrack.title : 'STATION IDLE';
        document.getElementById('trackArtist').textContent = d.currentTrack ? d.currentTrack.artist : 'Waiting...';
        document.getElementById('statListeners').textContent = (d.listeners || 0).toString().padStart(3, '0');
      }
    }

    function togglePower() {
       var audio = document.getElementById('radioAudio');
       var knob = document.getElementById('powerKnob');
       if(audioPlaying) {
         audio.pause(); audio.src = '';
         knob.classList.remove('active');
         audioPlaying = false;
         document.getElementById('knobLabel').textContent = 'POWER / OFF';
         stopNeedles();
       } else {
         audio.src = '/stream?' + Date.now();
         audio.play().catch(()=>{});
         knob.classList.add('active');
         audioPlaying = true;
         document.getElementById('knobLabel').textContent = 'POWER / ON';
         startNeedles();
       }
    }

    function startNeedles() {
      needleTimer = setInterval(() => {
        const a1 = -30 + Math.random() * 60;
        const a2 = -30 + Math.random() * 60;
        document.getElementById('needle1').style.transform = `rotate(${a1}deg)`;
        document.getElementById('needle2').style.transform = `rotate(${a2}deg)`;
      }, 150);
    }
    function stopNeedles() {
      clearInterval(needleTimer);
      document.getElementById('needle1').style.transform = 'rotate(-45deg)';
      document.getElementById('needle2').style.transform = 'rotate(-45deg)';
    }

    async function loadNews() {
       try {
         const r = await fetch('/data/herald.json');
         const d = await r.json();
         const track = document.getElementById('newsTrack');
         const items = d.news.map(n => `<a href="${n.link}" class="news-item">📜 ${n.title}: ${n.summary}</a>`).join('');
         track.innerHTML = items + items; // Double for infinite loop
       } catch(e) {}
    }

    checkAuth();
    loadNews();
  </script>
</body>
</html>
