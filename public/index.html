<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agum Bukuma Radio — Live</title>
    <link rel="stylesheet" href="/css/glass.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at top right, #1e3a8a, #0f172a); }
        .container { display: flex; flex-direction: column; align-items: center; gap: 2rem; z-index: 10; }
        .station-header { text-align: center; }
        .station-name { font-size: 3rem; font-weight: 900; margin: 0; background: linear-gradient(to right, #00f2fe, #4facfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 10px 20px rgba(0,242,254,0.2); }
        .portal-card { width: 350px; text-align: center; }
        .on-air-tag { background: rgba(255, 61, 0, 0.2); border: 1px solid rgba(255, 61, 0, 0.4); color: #ff3d00; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 900; letter-spacing: 2px; display: inline-block; margin-bottom: 1rem; box-shadow: 0 0 15px rgba(255, 61, 0, 0.2); }
        .track-title { font-size: 1.5rem; font-weight: 700; margin: 10px 0 5px; color: #fff; }
        .track-artist { font-size: 0.9rem; opacity: 0.7; margin-bottom: 1rem; }
        
        .progress-box { width: 100%; margin: 10px 0 20px; text-align: left; }
        .progress-bar-container { width: 100%; height: 6px; background: rgba(0,0,0,0.3); border-radius: 3px; overflow: hidden; position: relative; border: 1px solid rgba(255,255,255,0.05); }
        .progress-fill { height: 100%; width: 0%; background: var(--glass-accent); box-shadow: 0 0 10px var(--glass-accent); transition: width 0.3s linear; }
        .progress-time { display: flex; justify-content: space-between; font-size: 9px; opacity: 0.5; margin-top: 5px; font-weight: 700; }

        .main-button { width: 120px; height: 120px; border-radius: 50%; border: none; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); color: #fff; font-size: 2.5rem; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 20px 40px rgba(0,0,0,0.3), inset 0 2px 5px rgba(255,255,255,0.2); margin: 0 auto; }
        .main-button:hover { transform: scale(1.1) translateY(-5px); background: rgba(255,255,255,0.15); box-shadow: 0 30px 60px rgba(0,0,0,0.4), 0 0 30px rgba(0,242,254,0.3); }
        .main-button:active { transform: scale(0.95); }
        .main-button.playing { background: var(--glass-accent); color: #000; box-shadow: 0 0 50px rgba(0,242,254,0.6); }

        .viz-container { height: 60px; display: flex; align-items: flex-end; gap: 4px; margin-top: 2rem; }
        .viz-bar { flex: 1; background: var(--glass-accent); width: 4px; height: 10px; border-radius: 2px; transition: height 0.1s; opacity: 0.4; }
        
        .volume-box { position: absolute; bottom: 40px; width: 250px; display: flex; align-items: center; gap: 1rem; }
        .volume-icon { font-size: 1.2rem; opacity: 0.5; }
    </style>
</head>
<body>
    <div class="container">
        <div class="station-header">
            <h1 class="station-name">AGUM BUKUMA</h1>
            <p style="opacity: 0.5; letter-spacing: 4px; font-weight: 300;">PURE DRIVE STATION</p>
        </div>

        <div class="glass-card portal-card">
            <div id="airTag" class="on-air-tag">CONNECTING...</div>
            <div class="track-title" id="trackTitle">AWAITING FEED</div>
            <div class="track-artist" id="trackArtist">STATION STANDBY</div>

            <div class="progress-box">
                <div class="progress-bar-container">
                    <div id="progFill" class="progress-fill"></div>
                </div>
                <div class="progress-time">
                    <span id="progStart">0:00</span>
                    <span id="progEnd">0:00</span>
                </div>
            </div>

            <button class="main-button" id="playBtn" onclick="toggleTuneIn()">
                <span id="playIcon">▶</span>
            </button>
            <p style="margin-top: 1.5rem; font-size: 11px; opacity: 0.4; font-weight: 700; letter-spacing: 2px;">CONNECTION PORTAL</p>

            <div class="viz-container" id="viz">
                <div class="viz-bar"></div><div class="viz-bar"></div><div class="viz-bar"></div>
                <div class="viz-bar"></div><div class="viz-bar"></div><div class="viz-bar"></div>
                <div class="viz-bar"></div><div class="viz-bar"></div><div class="viz-bar"></div>
            </div>
        </div>

        <div class="volume-box glass-card" style="padding: 15px 25px; border-radius: 50px; flex-direction: row; position: relative; bottom: 0;">
            <span class="volume-icon">🔈</span>
            <input type="range" id="volSlider" min="0" max="100" value="80" style="flex: 1;" oninput="updateVolume(this.value)">
            <span class="volume-icon">🔊</span>
        </div>
    </div>

    <audio id="radio" crossorigin="anonymous"></audio>

    <script>
        const audio = document.getElementById('radio');
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        let isPlaying = false;
        let ws = null;
        let analyzer = null;
        let audioCtx = null;

        function initWS() {
            const proto = location.protocol === 'https:' ? 'wss' : 'ws';
            ws = new WebSocket(`${proto}://${location.host}/ws`);
            
            ws.onmessage = e => {
                const data = JSON.parse(e.data);
                if (data.type === 'status') {
                    updateUI(data);
                }
            };
            ws.onclose = () => setTimeout(initWS, 2000);
        }

        function updateUI(data) {
            document.getElementById('trackTitle').textContent = data.currentTrack?.title || 'AGUM BUKUMA RADIO';
            document.getElementById('trackArtist').textContent = data.currentTrack?.artist || 'STATION LIVE';
            
            const airTag = document.getElementById('airTag');
            airTag.textContent = data.isPlaying ? 'ON-AIR' : 'OFFLINE';
            airTag.style.borderColor = data.isPlaying ? 'rgba(0, 242, 254, 0.4)' : 'rgba(255, 61, 0, 0.4)';
            airTag.style.color = data.isPlaying ? '#00f2fe' : '#ff3d00';

            // Progress Bar
            if (data.duration > 0) {
                const perc = (data.elapsedTime / data.duration) * 100;
                document.getElementById('progFill').style.width = perc + '%';
                document.getElementById('progStart').textContent = formatTime(data.elapsedTime);
                document.getElementById('progEnd').textContent = formatTime(data.duration);
            }

            // Ghost Fix: Force stop if server says off
            if (!data.isPlaying && isPlaying) {
                toggleTuneIn();
            }
        }

        function formatTime(s) {
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m}:${sec.toString().padStart(2, '0')}`;
        }

        function setupAnalysis() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createMediaElementSource(audio);
            analyzer = audioCtx.createAnalyser();
            analyzer.fftSize = 256;
            source.connect(analyzer);
            analyzer.connect(audioCtx.destination);

            const bufferLength = analyzer.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            function sendFeedback() {
                if (!isPlaying || !ws || ws.readyState !== WebSocket.OPEN) return requestAnimationFrame(sendFeedback);
                analyzer.getByteFrequencyData(dataArray);
                let sum = 0;
                for(let i = 0; i < bufferLength; i++) sum += dataArray[i];
                const avg = sum / bufferLength;
                
                ws.send(JSON.stringify({
                    type: 'feedback',
                    vu: avg / 255 * 100,
                    timestamp: Date.now()
                }));
                requestAnimationFrame(sendFeedback);
            }
            sendFeedback();
        }

        function toggleTuneIn() {
            if (!isPlaying) {
                audio.src = '/stream?' + Date.now();
                audio.play().then(() => {
                    isPlaying = true;
                    playBtn.classList.add('playing');
                    playIcon.innerHTML = '⏸';
                    setupAnalysis();
                }).catch(e => console.error(e));
            } else {
                audio.pause();
                audio.src = '';
                isPlaying = false;
                playBtn.classList.remove('playing');
                playIcon.innerHTML = '▶';
            }
        }

        function updateVolume(v) { audio.volume = v / 100; }

        initWS();

        // Fake Viz Animation
        setInterval(() => {
            if (!isPlaying) return;
            document.querySelectorAll('.viz-bar').forEach(bar => {
                bar.style.height = (Math.random() * 40 + 10) + 'px';
                bar.style.opacity = Math.random() * 0.6 + 0.4;
            });
        }, 100);
    </script>
</body>
</html>
