<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>The Bukuma Herald — Agum Bukuma Radio</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1B4D3E">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="white-translucent">
  <meta name="apple-mobile-web-app-title" content="Bukuma Herald">
  <link rel="apple-touch-icon" href="/images/icon-512.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root{--cream:#FFF5E1;--leaf:#1B4D3E;--orange:#FF5733;--green:#2ECC71;--teal:#1ABC9C;--white:#FFFFFF;--shadow:rgba(46,204,113,0.1);}
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    body{background:var(--cream);color:var(--leaf);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:space-around;padding:20px;overflow-x:hidden;}
    .header-section{text-align:center;margin-bottom:20px;}
    .brand-title{font-size:28px;font-weight:900;color:var(--leaf);letter-spacing:-1px;text-transform:uppercase;}
    .tagline-box{background:var(--orange);padding:4px 12px;border-radius:4px;display:inline-block;margin-top:5px;}
    .tagline-text{color:#fff;font-weight:bold;font-size:12px;}
    .player-card{width:100%;max-width:380px;background:#fff;border-radius:30px;padding:30px;box-shadow:0 10px 30px var(--shadow);margin:20px 0;}
    .status-row{display:flex;align-items:center;margin-bottom:15px;}
    .live-indicator{width:8px;height:8px;border-radius:50%;background:var(--orange);margin-right:6px;box-shadow:0 0 8px var(--orange);animation:blink 1.5s infinite;}
    @keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
    .live-text{color:var(--orange);font-weight:800;font-size:12px;letter-spacing:1px;}
    .show-title{font-size:24px;font-weight:bold;color:var(--leaf);margin-bottom:4px;}
    .community-text{font-size:16px;color:var(--teal);margin-bottom:25px;}
    .progress-track{height:6px;background:#F0F0F0;border-radius:3px;overflow:hidden;}
    .progress-active{width:0%;height:100%;background:var(--green);transition:width 0.5s ease;}
    .action-center{text-align:center;margin:20px 0;}
    .play-button{width:100px;height:100px;border-radius:50%;background:var(--green);border:6px solid rgba(46,204,113,0.2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.3s;box-shadow:0 10px 20px rgba(46,204,113,0.2);margin:0 auto;}
    .play-button.playing{background:var(--orange);border-color:rgba(255,87,51,0.2);box-shadow:0 10px 20px rgba(255,87,51,0.2);}
    .play-button:active{transform:scale(0.9);}
    .play-icon{font-size:32px;color:#fff;line-height:1;}
    .play-label{margin-top:15px;color:var(--leaf);font-weight:bold;letter-spacing:1px;font-size:13px;}
    .nav-row{display:flex;width:100%;max-width:400px;justify-content:space-around;margin-top:20px;}
    .nav-item{display:flex;flex-direction:column;align-items:center;cursor:pointer;text-decoration:none;color:inherit;}
    .nav-emoji{font-size:24px;margin-bottom:5px;}
    .nav-text{color:var(--leaf);font-size:12px;font-weight:600;}
    .vault-section{width:100%;max-width:380px;margin-top:30px;}
    .vault-header{font-weight:900;font-size:18px;color:var(--leaf);margin-bottom:10px;opacity:0.8;}
    .vault-list{display:flex;flex-direction:column;gap:10px;}
    .vault-track{background:#fff;padding:15px;border-radius:15px;display:flex;align-items:center;gap:12px;box-shadow:0 4px 10px rgba(0,0,0,0.03);cursor:pointer;}
    .vault-track:hover{border:1px solid var(--green);}
    .vault-thumb{width:40px;height:40px;border-radius:8px;background:#eee;object-fit:cover;}
    .vault-info{flex:1;min-width:0;}
    .vault-name{font-weight:700;font-size:13px;color:var(--leaf);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .vault-artist{font-size:11px;color:var(--teal);}
    .vault-empty{opacity:0.5;font-size:12px;text-align:center;padding:20px 0;}
  </style>
</head>
<body>
  <div class="header-section">
    <h1 class="brand-title">THE BUKUMA HERALD</h1>
    <div class="tagline-box"><span class="tagline-text">AGUM BUKUMA RADIO</span></div>
  </div>

  <div class="player-card">
    <div class="status-row">
      <div class="live-indicator"></div>
      <span class="live-text" id="statusLabel">ON AIR</span>
    </div>
    <h2 class="show-title" id="displayTrackTitle">Agum Bukuma Radio</h2>
    <p class="community-text" id="displayTrackArtist">The Voice of the Niger Delta</p>
    <div class="progress-track"><div class="progress-active" id="progressFill"></div></div>
  </div>

  <div class="action-center">
    <div class="play-button" id="playBtnMain" onclick="tuneIn()">
      <span class="play-icon" id="playIcon">&#9654;</span>
    </div>
    <p class="play-label" id="playStatusText">TAP TO LISTEN</p>
  </div>

  <div class="nav-row">
    <a href="/app/" class="nav-item"><span class="nav-emoji">&#128251;</span><span class="nav-text">Player</span></a>
    <div class="nav-item"><span class="nav-emoji">&#128172;</span><span class="nav-text">Talk</span></div>
    <div class="nav-item"><span class="nav-emoji">&#127807;</span><span class="nav-text">Growth</span></div>
  </div>

  <div class="vault-section">
    <h3 class="vault-header">COMMUNITY VAULT</h3>
    <div class="vault-list" id="vaultContainer"><p class="vault-empty">Syncing...</p></div>
  </div>

  <!-- crossorigin="anonymous" required for Web Audio API MediaElementSource -->
  <audio id="radioStream" preload="none" crossorigin="anonymous"></audio>

  <script>
  'use strict';
  const S = { playing: false, retryDelay: 2000, stallTimer: null };

  // Register Service Worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js'));
  }

  // Media Session API — shows now-playing on lock screen
  function updateMediaSession(title, artist) {
    if (!('mediaSession' in navigator)) return;
    navigator.mediaSession.metadata = new MediaMetadata({
      title:  title  || 'Agum Bukuma Radio',
      artist: artist || 'The Voice of the Niger Delta',
      album:  'The Bukuma Herald',
      artwork: [{ src: '/images/icon-512.png', sizes: '512x512', type: 'image/png' }]
    });
    navigator.mediaSession.setActionHandler('play',  () => { if (!S.playing) tuneIn(); });
    navigator.mediaSession.setActionHandler('pause', () => { if (S.playing)  tuneIn(); });
  }

  // Poll /api/status every 10 s to update track info
  async function fetchStatus() {
    try {
      const d = await fetch('/api/status').then(r => r.json());
      if (d.currentTrack) {
        document.getElementById('displayTrackTitle').textContent  = d.currentTrack.title  || 'Agum Bukuma Radio';
        document.getElementById('displayTrackArtist').textContent = d.currentTrack.artist || 'Live Broadcast';
        updateMediaSession(d.currentTrack.title, d.currentTrack.artist);
      }
      document.getElementById('statusLabel').textContent = d.isPlaying ? 'ON AIR' : 'OFFLINE';
    } catch(e) {}
  }

  const audio = document.getElementById('radioStream');

  // On stream error: exponential back-off retry
  audio.addEventListener('error', () => {
    if (!S.playing) return;
    setTimeout(() => {
      if (S.playing) {
        audio.src = '/api/stream?' + Date.now();
        audio.play().catch(() => {});
      }
    }, S.retryDelay);
    S.retryDelay = Math.min(S.retryDelay * 1.5, 15000);
  });

  // On stall: retry after 10 s of buffering with no data
  audio.addEventListener('waiting', () => {
    if (!S.playing) return;
    if (S.stallTimer) clearTimeout(S.stallTimer);
    S.stallTimer = setTimeout(() => {
      if (S.playing && audio.readyState < 3) {
        audio.src = '/api/stream?' + Date.now();
        audio.play().catch(() => {});
      }
    }, 10000);
  });

  audio.addEventListener('playing', () => {
    if (S.stallTimer) { clearTimeout(S.stallTimer); S.stallTimer = null; }
    S.retryDelay = 2000;
  });

  // FIX: 'ended' on a live stream means server dropped — retry instead of stopping
  audio.addEventListener('ended', () => {
    if (!S.playing) return;
    setTimeout(() => {
      if (S.playing) {
        audio.src = '/api/stream?' + Date.now();
        audio.play().catch(() => {});
      }
    }, S.retryDelay);
  });

  // Main play/pause toggle
  function tuneIn() {
    if (!S.playing) {
      audio.src = '/api/stream?' + Date.now();
      audio.play().then(() => {
        S.playing = true;
        updatePlayUI(true);
      }).catch(() => {});
    } else {
      audio.pause();
      audio.src = '';
      S.playing = false;
      updatePlayUI(false);
    }
  }

  // FIX: use innerHTML so HTML entities render as symbols, not literal text
  function updatePlayUI(playing) {
    document.getElementById('playBtnMain').classList.toggle('playing', playing);
    document.getElementById('playIcon').innerHTML     = playing ? '&#9646;&#9646;' : '&#9654;';
    document.getElementById('playStatusText').textContent = playing ? 'LISTENING LIVE' : 'TAP TO LISTEN';
  }

  // Load vault (ready tracks from the library)
  async function loadVault() {
    try {
      const d = await fetch('/api/vault').then(r => r.json());
      const c = document.getElementById('vaultContainer');
      if (!c) return;
      if (!d.tracks || !d.tracks.length) {
        c.innerHTML = '<p class="vault-empty">No tracks ready yet. Station is downloading...</p>';
        return;
      }
      c.innerHTML = d.tracks.map(t => {
        // FIX: use encodeURIComponent for filename and safe double-quote attribute delimiters
        const safeTitle    = encodeURIComponent(t.title  || '');
        const safeArtist   = encodeURIComponent(t.artist || '');
        const safeFilename = encodeURIComponent(t.filename || (t.id + '.mp3'));
        const thumb = t.thumbnail || '/images/icon-512.png';
        return '<div class="vault-track" onclick="playVaultTrack(' +
          JSON.stringify(safeFilename) + ',' +
          JSON.stringify(safeTitle)    + ',' +
          JSON.stringify(safeArtist)   + ')">' +
          '<img src="' + thumb + '" class="vault-thumb" ' +
          'onerror="this.onerror=null;this.src=&quot;/images/icon-512.png&quot;">' +
          '<div class="vault-info">' +
          '<div class="vault-name">' + (t.title || 'Unknown') + '</div>' +
          '<div class="vault-artist">' + (t.artist || '') + '</div>' +
          '</div></div>';
      }).join('');
    } catch(e) {}
  }

  // FIX: use /api/downloads/:filename (which now exists in server.js)
  function playVaultTrack(filename, title, artist) {
    audio.src = '/api/downloads/' + decodeURIComponent(filename);
    audio.play().catch(() => {});
    S.playing = true;
    updatePlayUI(true);
    const t = decodeURIComponent(title);
    const a = decodeURIComponent(artist);
    document.getElementById('displayTrackTitle').textContent  = t;
    document.getElementById('displayTrackArtist').textContent = a;
    updateMediaSession(t, a);
  }

  // Initial load
  fetchStatus();
  loadVault();
  setInterval(fetchStatus, 10000);

  // Fake progress animation while playing
  let prog = 0;
  setInterval(() => {
    if (S.playing) {
      prog = (prog + 1) % 100;
      document.getElementById('progressFill').style.width = (30 + prog / 2) + '%';
    }
  }, 1000);
  </script>
</body>
</html>
